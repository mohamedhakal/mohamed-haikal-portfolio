<!DOCTYPE html>
<html lang="en" class="page-contact">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Get in touch — send a message." />
  <title>Mohamed Haikal - Contact</title>
  <link rel="icon" href="../assets/favicon.png" type="image/png" />
  <link rel="apple-touch-icon" href="../assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="page-contact">
  <div class="ambient-glow ambient-glow--blue" aria-hidden="true"></div>
  <div class="ambient-glow ambient-glow--purple" aria-hidden="true"></div>
  <div class="ambient-glow ambient-glow--white" aria-hidden="true"></div>

  <canvas id="dot-grid" aria-hidden="true"></canvas>

  <div id="cursor" class="cursor" aria-hidden="true">
    <div class="cursor__ring"></div>
    <div class="cursor__core"></div>
  </div>

  <main class="hero hero--contact">
    <div class="hero__content hero__content--contact">
      <a href="../" class="contact__back" data-cursor-hover>← Back</a>

      <p class="hero__eyebrow">Contact</p>
      <h1 class="hero__title">Get in Touch</h1>
      <p class="hero__subtitle">
        Have a question or want to work together? <br> Send me a message.
      </p>

      <form
        id="contact-form"
        class="contact-form"
        action="https://formsubmit.co/he1is1mohamed@gmail.com"
        method="POST"
      >
        <input type="hidden" name="_subject" value="New portfolio contact message" />
        <input type="hidden" name="_template" value="table" />
        <input type="hidden" name="_captcha" value="false" />
        <input type="hidden" name="_next" value="" />
        <input type="hidden" name="_replyto" value="" />
        <input type="text" name="_honey" class="contact-form__honey" tabindex="-1" autocomplete="off" />

        <div class="contact-form__field">
          <label class="contact-form__label" for="name">Full Name</label>
          <input
            class="contact-form__input"
            type="text"
            id="name"
            name="name"
            placeholder="Your name"
            required
            autocomplete="name"
          />
        </div>

        <div class="contact-form__field">
          <label class="contact-form__label" for="email">Email</label>
          <input
            class="contact-form__input"
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="contact-form__field">
          <label class="contact-form__label" for="message">Message</label>
          <textarea
            class="contact-form__input contact-form__textarea"
            id="message"
            name="message"
            placeholder="Your message..."
            rows="5"
            required
          ></textarea>
        </div>

        <button type="submit" class="contact-form__submit" data-cursor-hover>
          <span class="contact-form__submit-text">Send Message</span>
          <span class="contact-form__submit-loading" hidden>Sending...</span>
        </button>

        <p class="contact-form__status" id="form-status" role="status" aria-live="polite"></p>

        <div class="contact-form__links" aria-label="Professional links">
          <a
            href="https://www.linkedin.com/in/mohamedhakal/"
            class="contact-form__link"
            target="_blank"
            rel="noopener noreferrer"
            data-cursor-hover
          >
            <svg class="contact-form__link-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M6.5 8.5A2.25 2.25 0 1 0 6.5 4a2.25 2.25 0 0 0 0 4.5ZM4.5 10.25h4v9.25h-4v-9.25Zm6.5 0h3.83v1.26h.06c.53-1.01 1.84-2.08 3.79-2.08 4.05 0 4.8 2.67 4.8 6.14v3.93h-4v-3.48c0-1.66-.03-3.8-2.32-3.8-2.32 0-2.68 1.81-2.68 3.68v3.6h-4v-9.25Z" />
            </svg>
            LinkedIn
          </a>
          <a
            href="https://drive.google.com/file/d/1pzmjANsTXcqcOpnkXjoqNntMrhLp54E2/view?usp=sharing"
            class="contact-form__link"
            target="_blank"
            rel="noopener noreferrer"
            data-cursor-hover
          >
            <svg class="contact-form__link-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M6.75 3.5h6.7l3.8 3.8v12.95a.75.75 0 0 1-.75.75h-9.75a.75.75 0 0 1-.75-.75V4.25a.75.75 0 0 1 .75-.75Zm6.45 1.8v2.75a.75.75 0 0 0 .75.75h2.75L13.2 5.3ZM9 12h6m-6 3h6" />
            </svg>
            View CV
          </a>
        </div>

        <p class="contact-form__note">
          All messages are read and answered personally.
        </p>
      </form>
    </div>
  </main>

  <script src="../js/main.js"></script>
  <script src="../js/contact.js"></script>
</body>
</html>
